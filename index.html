<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Special Request For Eidi 🌙</title>
    <style>
        * {
            box-sizing: border-box;
            touch-action: none; /* Disables browser zooming/panning to let JS handle touch better */
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f3e5f5; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            width: 100vw;
        }

        .container {
            text-align: center;
            background: white;
            padding: 30px 20px;
            border-radius: 25px;
            box-shadow: 0 10px 25px rgba(123, 31, 162, 0.2);
            width: 85%;
            max-width: 400px;
            position: relative;
            z-index: 10;
        }

        h1 { color: #7b1fa2; margin-bottom: 20px; font-size: 1.5rem; }

        .buttons {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-top: 10px;
            min-height: 60px;
        }

        button {
            padding: 12px 20px;
            font-size: 14px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
        }

        #yesBtn {
            background-color: #9c27b0;
            color: white;
            flex: 1;
            touch-action: auto; /* Allow clicking this one! */
        }

        #noBtn {
            background-color: #9575cd;
            color: white;
            flex: 1;
            transition: all 0.2s ease;
            z-index: 9999;
            user-select: none;
        }

        .address-form {
            display: none;
            flex-direction: column;
            gap: 12px;
            margin-top: 15px;
            text-align: left;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e1bee7;
            border-radius: 10px;
            font-size: 16px;
            touch-action: auto;
        }

        .submit-btn { background-color: #6a1b9a; color: white; width: 100%; touch-action: auto; }
    </style>
</head>
<body>

    <div class="container" id="mainCard">
        <div id="askSection">
            <h1 id="question">Will you please take your Eidi from me? 🎁✨</h1>
            <div class="buttons">
                <button id="yesBtn" onclick="showForm()">Yes, I'm taking it! 😍</button>
                <button id="noBtn">No 😔</button>
            </div>
        </div>

        <div id="formSection" class="address-form">
            <h1 style="font-size: 20px;">Thank you for accepting! 💜</h1>
            <label>Full Name *</label>
            <input type="text" id="userName" placeholder="Your name">
            <label>Delivery Address *</label>
            <input type="text" id="userAddress" placeholder="Where should I send it?">
            <label>Favorite Chocolate *</label>
            <input type="text" id="userTreat" placeholder="Chocolate, cake, etc? 🍫">
            <button class="submit-btn" onclick="sendWhatsApp()">Submit</button>
        </div>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');
        const question = document.getElementById('question');

        // Function to move the button
        function moveButton(e) {
            // Stop the click/tap from happening
            e.preventDefault();
            e.stopPropagation();

            question.innerHTML = "Please? Just for me! 🥺🤲";
            
            noBtn.style.position = 'fixed';
            
            const btnWidth = noBtn.offsetWidth;
            const btnHeight = noBtn.offsetHeight;
            
            // Random position within viewport
            const maxX = window.innerWidth - btnWidth - 20;
            const maxY = window.innerHeight - btnHeight - 20;

            const randomX = Math.floor(Math.random() * maxX);
            const randomY = Math.floor(Math.random() * maxY);

            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        }

        // Event Listeners
        // 1. Desktop Hover
        noBtn.addEventListener('mouseover', moveButton);
        
        // 2. Mobile Touch (Start)
        noBtn.addEventListener('touchstart', moveButton, {passive: false});

        // 3. Fallback Click (to ensure it NEVER triggers anything else)
        noBtn.addEventListener('click', (e) => {
            e.preventDefault();
            moveButton(e);
        });

        function showForm() {
            noBtn.style.display = 'none';
            document.getElementById('askSection').style.display = 'none';
            document.getElementById('formSection').style.display = 'flex';
            // Re-enable touch for the form fields
            document.querySelectorAll('input, button').forEach(el => el.style.touchAction = 'auto');
        }

        function sendWhatsApp() {
            const myNumber = "923362842234"; 
            const name = document.getElementById('userName').value.trim();
            const addr = document.getElementById('userAddress').value.trim();
            const treat = document.getElementById('userTreat').value.trim();

            if (!name || !addr || !treat) {
                alert("Please fill everything! 💜");
                return;
            }

            const message = `Hi! I've accepted your Eidi! 💜%0A*Name:* ${name}%0A*Address:* ${addr}%0A*Treat:* ${treat}`;
            window.open(`https://wa.me/${myNumber}?text=${message}`, '_blank');
            
            document.getElementById('mainCard').innerHTML = `
                <h1>Eidi Confirmed! 🎉</h1>
                <p>The Eidi is on its way. 🥰💰</p>
                <div style="font-size: 50px;">🌙✨💜</div>
            `;
        }
    </script>
</body>
</html>

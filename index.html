<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Special Request For Eidi 🌙</title>
    <style>
        * {
            box-sizing: border-box;
            touch-action: manipulation;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f3e5f5; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            text-align: center;
            background: white;
            padding: 30px 20px;
            border-radius: 25px;
            box-shadow: 0 10px 25px rgba(123, 31, 162, 0.2);
            width: 85%;
            max-width: 400px;
            transition: all 0.4s ease;
            position: relative;
            z-index: 10;
        }

        h1 {
            color: #7b1fa2;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }

        .buttons {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-top: 10px;
            min-height: 50px;
        }

        button {
            padding: 12px 20px;
            font-size: 14px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            white-space: nowrap;
        }

        #yesBtn {
            background-color: #9c27b0;
            color: white;
            box-shadow: 0 4px 10px rgba(156, 39, 176, 0.3);
            flex: 1;
        }

        #noBtn {
            background-color: #9575cd;
            color: white;
            position: relative; 
            z-index: 999;
            flex: 1;
            /* Added transition for a smoother 'run away' effect */
            transition: left 0.2s ease, top 0.2s ease;
        }

        .address-form {
            display: none;
            flex-direction: column;
            gap: 12px;
            margin-top: 15px;
            text-align: left;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e1bee7;
            border-radius: 10px;
            outline: none;
            font-size: 16px;
        }

        input:focus { border-color: #9c27b0; }

        label {
            color: #7b1fa2;
            font-weight: bold;
            font-size: 13px;
        }

        .required-star { color: #f44336; }

        .submit-btn {
            background-color: #6a1b9a;
            color: white;
            margin-top: 10px;
            width: 100%;
        }

        .finish-title { font-size: 28px !important; }
    </style>
</head>
<body>

    <div class="container" id="mainCard">
        <div id="askSection">
            <h1 id="question">Will you please take your Eidi from me? 🎁✨</h1>
            <div class="buttons">
                <button id="yesBtn" onclick="showForm()">Yes, I'm taking it! 😍</button>
                <button id="noBtn" onmouseover="moveButton(event)" ontouchstart="moveButton(event)">No 😔</button>
            </div>
        </div>

        <div id="formSection" class="address-form">
            <h1 style="font-size: 20px;">Thank you for accepting! 💜</h1>
            <p style="text-align:center; color: #555; font-size: 14px;">Please fill every field below:</p>
            
            <label>Full Name <span class="required-star">*</span></label>
            <input type="text" id="userName" placeholder="Your name" required>
            
            <label>Delivery Address <span class="required-star">*</span></label>
            <input type="text" id="userAddress" placeholder="Where should I send it?" required>
            
            <label>Favorite Chocolate <span class="required-star">*</span></label>
            <input type="text" id="userTreat" placeholder="Chocolate, cake, etc? 🍫" required>
            
            <button class="submit-btn" onclick="sendWhatsApp()">Submit</button>
        </div>
    </div>

    <script>
        function moveButton(event) {
            // This prevents the 'click' event from firing after the touch
            if (event && event.type === 'touchstart') {
                event.preventDefault();
            }

            const noBtn = document.getElementById('noBtn');
            const question = document.getElementById('question');
            question.innerHTML = "Please? Just for me! 🥺🤲";
            
            noBtn.style.position = 'fixed';
            noBtn.style.flex = 'none';

            const btnWidth = noBtn.offsetWidth;
            const btnHeight = noBtn.offsetHeight;
            
            // Padding to ensure button stays away from the very edges
            const padding = 20;
            const maxX = window.innerWidth - btnWidth - padding;
            const maxY = window.innerHeight - btnHeight - padding;

            const randomX = Math.max(padding, Math.floor(Math.random() * maxX));
            const randomY = Math.max(padding, Math.floor(Math.random() * maxY));

            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        }

        function showForm() {
            const noBtn = document.getElementById('noBtn');
            if(noBtn) noBtn.style.display = 'none';
            document.getElementById('askSection').style.display = 'none';
            document.getElementById('formSection').style.display = 'flex';
        }

        function sendWhatsApp() {
            // REMEMBER TO CHANGE THIS TO YOUR ACTUAL NUMBER
            const myNumber = "923362842234"; 
            
            const name = document.getElementById('userName').value.trim();
            const addr = document.getElementById('userAddress').value.trim();
            const treat = document.getElementById('userTreat').value.trim();

            if (!name || !addr || !treat) {
                alert("All fields are required! Please don't leave anything blank 💜");
                return;
            }

            const message = `Hi! I've accepted your Eidi! 💜%0A%0A*Name:* ${name}%0A*Address:* ${addr}%0A*Treat:* ${treat}`;
            window.open(`https://wa.me/${myNumber}?text=${message}`, '_blank');
            
            finish();
        }

        function finish() {
            const card = document.getElementById('mainCard');
            card.innerHTML = `
                <h1 class="finish-title">Eidi Confirmed! 🎉</h1>
                <p style="font-size: 16px; color: #555;">The Eidi is on its way. 🥰💰</p>
                <div style="font-size: 50px; margin-top:20px;">🌙✨💜</div>
            `;
            document.body.style.backgroundColor = "#e1bee7";
        }
    </script>
</body>
</html>
